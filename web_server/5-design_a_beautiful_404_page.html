<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Lost in Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 15%;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            animation: float 3s ease-in-out infinite;
        }

        p {
            font-size: 24px;
        }

        .astronaut {
            font-size: 80px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #ff9800;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: white;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="astronaut">🚀</div>
        <h1>404</h1>
        <p>Ceci n'est pas une page</p>
        <p>Oops! The page you’re looking for drifted into space.</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
